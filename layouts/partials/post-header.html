{{ if .Params.headerHtml }}
<div class="post-header post-header--html">
  {{ .Params.headerHtml | safeHTML }}
</div>
{{ else if .Params.header }}
{{ $img := .Resources.GetMatch .Params.header }}
{{ if $img }}
{{ $imgConverted := $img.Resize "2400x jpg" }}
<figure class="post-header">
  <img src="{{ $imgConverted.RelPermalink }}" alt="{{ .Title }}">
</figure>
{{ end }}
{{ end }}
