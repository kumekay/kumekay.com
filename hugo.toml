baseURL = 'https://kumekay.com/'
languageCode = 'en-us'
title = 'kumekay'



# URL structure - preserve Ghost URLs
[permalinks.page]
posts = '/:slug/'

# Taxonomies
[taxonomies]
tag = 'tags'

[outputs]
home = ['html', 'rss']
section = ['html']
taxonomy = ['html']
term = ['html']

# Markdown rendering
[markup.goldmark.renderer]
unsafe = true # Allow raw HTML in markdown (for headerHtml)

# Site params
[params]
author = 'Sergei Silnov'
